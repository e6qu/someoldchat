name: Publish container

on:
  push:
    branches: [main]

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/e6qu/someoldchat

jobs:
  build:
    name: Build (${{ matrix.arch.suffix }})
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: version
        name: Resolve immutable image tag
        run: echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: push
        name: Build and publish architecture image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          platforms: ${{ matrix.arch.platform }}
          push: true
          provenance: mode=max
          sbom: true
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.sha }}-${{ matrix.arch.suffix }}
          cache-from: type=gha,scope=someoldchat-${{ matrix.arch.suffix }}
          cache-to: type=gha,scope=someoldchat-${{ matrix.arch.suffix }},mode=max

      - name: Attest architecture image
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
          create-storage-record: false

  manifest:
    name: Publish multi-architecture manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - id: version
        name: Resolve immutable image tag
        run: echo "sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble multi-architecture manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ env.IMAGE }}:${{ steps.version.outputs.sha }}" \
            "${{ env.IMAGE }}:${{ steps.version.outputs.sha }}-amd64" \
            "${{ env.IMAGE }}:${{ steps.version.outputs.sha }}-arm64"
