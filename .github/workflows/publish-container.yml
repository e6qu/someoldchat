name: Publish container

on:
  push:
    branches: [main]

concurrency:
  group: publish-container-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/e6qu/someoldchat

jobs:
  build:
    name: Build (${{ matrix.arch.suffix }})
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    steps:
      - uses: actions/checkout@v7.0.0

      - id: version
        name: Resolve immutable image tag
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish architecture image
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          platforms: ${{ matrix.arch.platform }}
          push: true
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.sha }}-${{ matrix.arch.suffix }}
          cache-from: type=gha,scope=someoldchat-${{ matrix.arch.suffix }}
          cache-to: type=gha,scope=someoldchat-${{ matrix.arch.suffix }},mode=max

  manifest:
    name: Publish multi-architecture manifest
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7.0.0

      - id: version
        name: Resolve immutable image tag
        run: echo "sha=$(git rev-parse --short=12 HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble multi-architecture manifest
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "${{ env.IMAGE }}:${{ steps.version.outputs.sha }}" \
            "${{ env.IMAGE }}:${{ steps.version.outputs.sha }}-amd64" \
            "${{ env.IMAGE }}:${{ steps.version.outputs.sha }}-arm64"
