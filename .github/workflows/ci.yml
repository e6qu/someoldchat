name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go checks
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Buf
        uses: bufbuild/buf-setup-action@a47c93e0b1648d5651a065437926377d060baa99 # v1.50.0
        with:
          version: 1.71.0
          github_token: ${{ github.token }}

      - name: Check formatting and generated files
        run: make fmt-check workflow-check generated-check proto-lint

      - name: Check contracts and SDK inventory
        run: make contract-check sdk-inventory-check

      - name: Ratchet compatibility ledger
        env:
          BASE_REF: origin/${{ github.base_ref }}
        run: |
          if git cat-file -e "$BASE_REF:specs/compatibility.yaml" 2>/dev/null; then
            make contract-ratchet BASE_REF="$BASE_REF"
          else
            echo "Compatibility ratchet bootstrap: $BASE_REF has no compatibility ledger."
            make contract-check
          fi

      - name: Report compatibility progress
        run: make compatibility-report

      - name: Run tests
        run: make test

      - name: Run bounded load tests
        run: make test-load

      - name: Run distributed transport load test
        run: make test-transport-load

      - name: Run fuzz smoke tests
        run: make test-fuzz

      - name: Run race tests
        run: make test-race

      - name: Run static analysis
        run: go vet ./...

      - name: Build static binaries
        run: make build-static

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        directory:
          - deploy/ecs-scale-zero
          - terraform/ecs-runtime
    defaults:
      run:
        working-directory: ${{ matrix.directory }}
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform init -backend=false -input=false

      - name: Validate Terraform
        run: terraform validate

  sdk:
    name: Official SDK qualification
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Set up Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Set up Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version: 2.8.1

      - name: Run official SDK qualification
        run: make sdk-qualification

  browser:
    name: Browser qualification
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install browser qualification dependencies
        run: make browser-qualification

  dqlite:
    name: dqlite qualification
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install native dqlite dependencies
        run: |
          sudo add-apt-repository -y ppa:dqlite/dev
          sudo apt-get update
          sudo apt-get install -y dqlite-tools-v3 libdqlite-dev

      - name: Build dqlite binaries
        run: make build-dqlite

      - name: Run dqlite tests
        run: make test-dqlite

  postgres:
    name: PostgreSQL qualification
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18.1
        env:
          POSTGRES_USER: sameoldchat
          POSTGRES_PASSWORD: sameoldchat
          POSTGRES_DB: sameoldchat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sameoldchat -d sameoldchat"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Run PostgreSQL qualification
        env:
          SAMEOLDCHAT_POSTGRES_DSN: postgres://sameoldchat:sameoldchat@localhost:5432/sameoldchat?sslmode=disable
        run: make test-postgres
