version: v2

modules:
  - path: proto

lint:
  use:
    - STANDARD
  # Presence intentionally reuses the stable User model for several
  # operations; the shared response is the contract, not an untyped envelope.
  except:
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_REQUEST_STANDARD_NAME
    - RPC_RESPONSE_STANDARD_NAME
