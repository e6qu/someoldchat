syntax = "proto3";

package sameoldchat.chat.v1;

option go_package = "github.com/sameoldchat/sameoldchat/internal/modules/chat/transport/grpc/gen/sameoldchat/chat/v1;chatv1";

import "sameoldchat/chat/v1/conversation_mutations.proto";

message Call {
  string workspace_id = 1;
  string id = 2;
  string external_unique_id = 3;
  string external_display_id = 4;
  string join_url = 5;
  string desktop_app_join_url = 6;
  string title = 7;
  string created_by = 8;
  repeated string participants = 9;
  int64 started_at = 10;
  int64 ended_at = 11;
  int64 duration_seconds = 12;
}

message AddCallRequest {
  string workspace_id = 1;
  string user_id = 2;
  string external_unique_id = 3;
  string external_display_id = 4;
  string join_url = 5;
  string desktop_app_join_url = 6;
  string title = 7;
  int64 started_at = 8;
  repeated string participants = 9;
}

message CallRequest {
  string workspace_id = 1;
  string user_id = 2;
  string call_id = 3;
}

message EndCallRequest {
  string workspace_id = 1;
  string user_id = 2;
  string call_id = 3;
  int64 duration_seconds = 4;
}

message UpdateCallRequest {
  string workspace_id = 1;
  string user_id = 2;
  string call_id = 3;
  string title = 4;
  string join_url = 5;
  string desktop_app_join_url = 6;
}

message CallParticipantsRequest {
  string workspace_id = 1;
  string user_id = 2;
  string call_id = 3;
  repeated string participants = 4;
}

service CallsService {
  rpc AddCall(AddCallRequest) returns (Call);
  rpc EndCall(EndCallRequest) returns (MutationResponse);
  rpc CallInfo(CallRequest) returns (Call);
  rpc UpdateCall(UpdateCallRequest) returns (Call);
  rpc AddCallParticipants(CallParticipantsRequest) returns (MutationResponse);
  rpc RemoveCallParticipants(CallParticipantsRequest) returns (MutationResponse);
}
