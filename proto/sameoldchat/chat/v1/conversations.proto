syntax = "proto3";

package sameoldchat.chat.v1;

option go_package = "github.com/sameoldchat/sameoldchat/internal/modules/chat/transport/grpc/gen/sameoldchat/chat/v1;chatv1";

message Conversation {
  string id = 1;
  string workspace_id = 2;
  string name = 3;
  string topic = 4;
  string purpose = 5;
  bool archived = 6;
  bool is_private = 7;
  bool is_direct = 8;
  bool is_group_direct = 9;
  int64 unread_count = 10;
}

message ConversationPage {
  repeated Conversation conversations = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

message ConversationInfoRequest {
  string workspace_id = 1;
  string user_id = 2;
  string conversation_id = 3;
}

message ConversationsRequest {
  string workspace_id = 1;
  string user_id = 2;
  int32 limit = 3;
  string cursor = 4;
  repeated string types = 5;
  bool exclude_archived = 6;
  string member_user_id = 7;
}

service ConversationsService {
  rpc ConversationInfo(ConversationInfoRequest) returns (Conversation);
  rpc Conversations(ConversationsRequest) returns (ConversationPage);
}
