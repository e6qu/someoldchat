syntax = "proto3";

package sameoldchat.chat.v1;

option go_package = "github.com/sameoldchat/sameoldchat/internal/modules/chat/transport/grpc/gen/sameoldchat/chat/v1;chatv1";

message OpenDialogRequest {
  string workspace_id = 1;
  string user_id = 2;
  string trigger_id = 3;
  string payload = 4;
}

message DialogMutationResponse {
  bool ok = 1;
}

service DialogsService {
  rpc OpenDialog(OpenDialogRequest) returns (DialogMutationResponse);
}
