syntax = "proto3";

package sameoldchat.chat.v1;

option go_package = "github.com/sameoldchat/sameoldchat/internal/modules/chat/transport/grpc/gen/sameoldchat/chat/v1;chatv1";

message Bot {
  string id = 1;
  string workspace_id = 2;
  string app_id = 3;
  string user_id = 4;
  string name = 5;
  string image_36 = 6;
  string image_48 = 7;
  string image_72 = 8;
  bool deleted = 9;
  int64 updated_at = 10;
}

message BotInfoRequest {
  string workspace_id = 1;
  string user_id = 2;
  string bot_id = 3;
}

service BotsService {
  rpc BotInfo(BotInfoRequest) returns (Bot);
}
