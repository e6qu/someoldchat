syntax = "proto3";

package sameoldchat.chat.v1;

option go_package = "github.com/sameoldchat/sameoldchat/internal/modules/chat/transport/grpc/gen/sameoldchat/chat/v1;chatv1";

import "sameoldchat/chat/v1/conversation_mutations.proto";

message UserProfile {
  string display_name = 1;
  string status_text = 2;
  string status_emoji = 3;
  string image_24 = 4;
  string image_32 = 5;
  string image_48 = 6;
  string image_72 = 7;
  string image_192 = 8;
  string image_512 = 9;
  string image_1024 = 10;
}

message User {
  string id = 1;
  string workspace_id = 2;
  string email = 3;
  string name = 4;
  string real_name = 5;
  UserProfile profile = 6;
  string presence = 7;
  bool deleted = 8;
}

message SetUserPresenceRequest {
  string workspace_id = 1;
  string user_id = 2;
  string presence = 3;
}

message UserRequest {
  string workspace_id = 1;
  string user_id = 2;
  string requested_user_id = 3;
}

message UserByEmailRequest {
  string workspace_id = 1;
  string user_id = 2;
  string email = 3;
}

message SetUserProfileRequest {
  string workspace_id = 1;
  string user_id = 2;
  UserProfile profile = 3;
}

message DoNotDisturb {
  string workspace_id = 1;
  string user_id = 2;
  bool enabled = 3;
  int64 snooze_until = 4;
  int64 next_start_at = 5;
  int64 next_end_at = 6;
}

message DoNotDisturbRequest {
  string workspace_id = 1;
  string user_id = 2;
  string requested_user_id = 3;
}

message SetSnoozeRequest {
  string workspace_id = 1;
  string user_id = 2;
  int64 minutes = 3;
}

service PresenceService {
  rpc UserInfo(UserRequest) returns (User);
  rpc UserByEmail(UserByEmailRequest) returns (User);
  rpc SetUserProfile(SetUserProfileRequest) returns (User);
  rpc SetUserPresence(SetUserPresenceRequest) returns (User);
  rpc DoNotDisturbInfo(DoNotDisturbRequest) returns (DoNotDisturb);
  rpc SetSnooze(SetSnoozeRequest) returns (DoNotDisturb);
  rpc EndSnooze(DoNotDisturbRequest) returns (DoNotDisturb);
  rpc EndDND(DoNotDisturbRequest) returns (MutationResponse);
}
