syntax = "proto3";

package sameoldchat.chat.v1;

option go_package = "github.com/sameoldchat/sameoldchat/internal/modules/chat/transport/grpc/gen/sameoldchat/chat/v1;chatv1";

import "sameoldchat/chat/v1/conversation_mutations.proto";

message ScheduledMessage {
  string workspace_id = 1;
  string id = 2;
  string channel_id = 3;
  string author_id = 4;
  string text = 5;
  int64 post_at = 6;
  int64 created_at = 7;
  string blocks = 8;
  string attachments = 9;
}

message ScheduleMessageRequest {
  string workspace_id = 1;
  string user_id = 2;
  string channel_id = 3;
  string text = 4;
  int64 post_at = 5;
  string blocks = 6;
  string attachments = 7;
}

message ScheduledMessagesRequest {
  string workspace_id = 1;
  string user_id = 2;
  string channel_id = 3;
  int32 limit = 4;
  string cursor = 5;
}

message DeleteScheduledMessageRequest {
  string workspace_id = 1;
  string user_id = 2;
  string channel_id = 3;
  string scheduled_message_id = 4;
}

message ScheduledMessagePage {
  repeated ScheduledMessage scheduled_messages = 1;
  string next_cursor = 2;
  bool has_more = 3;
}

service ScheduledMessagesService {
  rpc ScheduleMessage(ScheduleMessageRequest) returns (ScheduledMessage);
  rpc ScheduledMessages(ScheduledMessagesRequest) returns (ScheduledMessagePage);
  rpc DeleteScheduledMessage(DeleteScheduledMessageRequest) returns (MutationResponse);
}
