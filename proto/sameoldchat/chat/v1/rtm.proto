syntax = "proto3";

package sameoldchat.chat.v1;

option go_package = "github.com/sameoldchat/sameoldchat/internal/modules/chat/transport/grpc/gen/sameoldchat/chat/v1;chatv1";

message RTMConnectionRequest {
  string workspace_id = 1;
  string user_id = 2;
}

message RTMConnectionIDRequest {
  string id = 1;
}

message RTMConnection {
  string id = 1;
  string workspace_id = 2;
  string user_id = 3;
  int64 expires_at_unix_nano = 4;
}

message SocketModeConnectionRequest {
  string app_id = 1;
  string id = 2;
  int64 expires_at_unix_nano = 3;
}

message SocketModeConnection {
  string id = 1;
  string app_id = 2;
  int64 expires_at_unix_nano = 3;
}

message SocketModeConnectionRenewalRequest {
  string id = 1;
  int64 expires_at_unix_nano = 2;
}

message SocketModeConnectionCount {
  string app_id = 1;
  int32 count = 2;
}

message SocketModeCursorRequest {
  string app_id = 1;
  uint64 sequence = 2;
}

message SocketModeCursor {
  string app_id = 1;
  uint64 sequence = 2;
}

message SocketModeResponseRequest {
  string app_id = 1;
  string envelope_id = 2;
  string payload = 3;
  int64 received_at_unix_nano = 4;
}

message SocketModeResponse {
  string app_id = 1;
  string envelope_id = 2;
  string payload = 3;
  int64 received_at_unix_nano = 4;
}

message SocketModeResponseLeaseRequest {
  string app_id = 1;
  string owner = 2;
  int32 limit = 3;
  int64 lease_nanos = 4;
}

message SocketModeResponseKey {
  string app_id = 1;
  string envelope_id = 2;
}

message SocketModeResponseBatch {
  repeated SocketModeResponse responses = 1;
}

message SocketModeResponseAckRequest {
  string owner = 1;
  repeated SocketModeResponseKey responses = 2;
}

message SocketModeResponseReleaseRequest {
  string owner = 1;
  repeated SocketModeResponseKey responses = 2;
  int64 retry_at_unix_nano = 3;
}

service RTMService {
  rpc CreateConnection(RTMConnectionRequest) returns (RTMConnection);
  rpc ConsumeConnection(RTMConnectionIDRequest) returns (RTMConnection);
  rpc CreateSocketModeConnection(SocketModeConnectionRequest) returns (SocketModeConnection);
  rpc ConsumeSocketModeConnection(RTMConnectionIDRequest) returns (SocketModeConnection);
  rpc RenewSocketModeConnection(SocketModeConnectionRenewalRequest) returns (SocketModeConnection);
  rpc ReleaseSocketModeConnection(RTMConnectionIDRequest) returns (SocketModeConnection);
  rpc CountSocketModeConnections(SocketModeCursorRequest) returns (SocketModeConnectionCount);
  rpc GetSocketModeCursor(SocketModeCursorRequest) returns (SocketModeCursor);
  rpc SetSocketModeCursor(SocketModeCursorRequest) returns (SocketModeCursor);
  rpc RecordSocketModeResponse(SocketModeResponseRequest) returns (SocketModeResponse);
  rpc ClaimSocketModeResponses(SocketModeResponseLeaseRequest) returns (SocketModeResponseBatch);
  rpc AckSocketModeResponses(SocketModeResponseAckRequest) returns (SocketModeResponseBatch);
  rpc ReleaseSocketModeResponses(SocketModeResponseReleaseRequest) returns (SocketModeResponseBatch);
}
